# Docker Compose — the single-host stack that runs the whole registry.
#
#   registry-api  Go service (Terraform Registry Protocol + /m/ direct endpoint),
#                 bundled patch toolkit; ensures the S3 bucket on startup
#   versitygw     S3 storage (Versity S3 Gateway, Apache-2.0) for module zips
#   caddy         wildcard reverse proxy + automatic local TLS (subdomains + apex)
#   builder       one-shot pre-builder (registry-api image) — `--profile build`
#
# Quick start:
#   cp .env.example .env          # set a token
#   docker compose up -d --build
#   ./build.sh cis_v600 s3-bucket 5.11.0
#   # add conformer.local + *.conformer.local -> 127.0.0.1 to /etc/hosts, trust caddy CA

name: conformer

services:
  registry-api:
    image: conformer-registry-api:latest
    build:
      context: ..
      dockerfile: registry-api/Dockerfile
    environment:
      AUTH_MODE: ${AUTH_MODE:-static}
      STATIC_TOKENS: ${STATIC_TOKENS}
      DOMAIN: ${DOMAIN:-conformer.local}
      S3_ENDPOINT: versitygw:7070
      S3_ACCESS_KEY: ${S3_ROOT_USER:-conformer}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:-conformer-secret}
      S3_USE_SSL: "false"
      S3_BUCKET: modules
      # Presigned download URLs must be reachable by the Terraform consumer on
      # the host (not the internal versitygw:7070). versitygw publishes 7070
      # below, so presign against localhost:7070. The S3 signature binds the
      # host, so this must match the host the consumer actually connects to.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:7070}
      S3_PUBLIC_USE_SSL: ${S3_PUBLIC_USE_SSL:-false}
      LISTEN_ADDR: ":8080"
      # Dynamic on-demand patching: cache miss → fetch upstream + patch + cache.
      DYNAMIC_BUILD: ${DYNAMIC_BUILD:-true}
      UPSTREAM_REGISTRY: ${UPSTREAM_REGISTRY:-registry.terraform.io}
      # Restrict which upstream modules may be dynamically built (globs, CSV).
      # Empty = allow any.
      ALLOWED_MODULES: ${ALLOWED_MODULES:-}
      GITLEAKS_STRICT: ${GITLEAKS_STRICT:-false}
      # external OIDC only (ignored when AUTH_MODE=static):
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-}
    depends_on:
      - versitygw
    restart: unless-stopped

  # S3 storage — versitygw (Versity S3 Gateway), Apache-2.0. POSIX backend:
  # buckets map to directories under /data. Replaces MinIO (AGPL) — the project
  # ships no AGPL binaries. registry-api creates the `modules` bucket on startup
  # (with retry), so no init step is needed.
  versitygw:
    image: versity/versitygw:latest
    environment:
      VGW_BACKEND: posix
      VGW_BACKEND_ARGS: /data
      VGW_PORT: ":7070"
      VGW_REGION: us-east-1
      ROOT_ACCESS_KEY: ${S3_ROOT_USER:-conformer}
      ROOT_SECRET_KEY: ${S3_ROOT_PASSWORD:-conformer-secret}
    volumes:
      - vgw-data:/data
    ports:
      # Bind address defaults to 0.0.0.0 (public). Set BIND_IP to a VPN interface
      # IP (e.g. the WireGuard wg0 address) to expose the registry ONLY over the
      # VPN — see docs/07-private-vpn-access.md. Presigned download URLs are
      # served from here, so it must share the same reachability as Caddy.
      - "${BIND_IP:-0.0.0.0}:7070:7070"   # S3 API — presigned download URLs resolve from the host
    restart: unless-stopped

  caddy:
    image: conformer-caddy:latest
    build:
      context: ..
      dockerfile: compose/caddy/Dockerfile
    depends_on:
      - registry-api
    environment:
      # Registry domain + TLS strategy. Defaults give the local-CA dev setup;
      # set DOMAIN + CADDY_TLS (+ CF_API_TOKEN) in .env for a real DNS-01 cert.
      DOMAIN: ${DOMAIN:-conformer.local}
      CADDY_GLOBAL: ${CADDY_GLOBAL:-}
      CADDY_SITE_TLS: ${CADDY_SITE_TLS-tls internal}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
    ports:
      # Default 0.0.0.0 (public). Set BIND_IP to a VPN interface IP (WireGuard
      # wg0) to make the registry reachable ONLY over the VPN. The sole port that
      # must stay public is then WireGuard's 51820/udp on the host (not here).
      - "${BIND_IP:-0.0.0.0}:443:443"
      - "${BIND_IP:-0.0.0.0}:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  # One-shot pre-builder — replaces Tekton. Reuses the registry-api image
  # (bundles tofu/mapotf/hcledit/gitleaks + the registry-api binary for uploads).
  # Run via ./build.sh (profile keeps it out of `up`). Mounts the repo so it
  # sees the current transformations/, frameworks/ and scripts/.
  builder:
    profiles: ["build"]
    image: conformer-registry-api:latest
    build:
      context: ..
      dockerfile: registry-api/Dockerfile
    environment:
      S3_ENDPOINT: versitygw:7070
      S3_ACCESS_KEY: ${S3_ROOT_USER:-conformer}
      S3_SECRET_KEY: ${S3_ROOT_PASSWORD:-conformer-secret}
      S3_BUCKET: modules
      UPSTREAM_REGISTRY: ${UPSTREAM_REGISTRY:-registry.terraform.io}
    volumes:
      - ..:/repo:ro
      - build-tmp:/tmp/build
    working_dir: /repo
    entrypoint: ["/repo/compose/build-module.sh"]

  # NOTE: the registry API also supports OIDC auth (AUTH_MODE=keycloak) against an
  # EXTERNAL Keycloak you run yourself — point KEYCLOAK_ISSUER / KEYCLOAK_JWKS_URL
  # at it. This stack ships static-token auth only (the simple default).

volumes:
  vgw-data:
  caddy-data:
  caddy-config:
  build-tmp:
