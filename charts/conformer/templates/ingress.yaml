{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "conformer.fullname" . }}-wildcard
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.certManager.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuer.name }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.certManager.enabled }}
  tls:
    - hosts:
        - "*.{{ .Values.domain }}"
        - "{{ .Values.domain }}"
      secretName: {{ include "conformer.fullname" . }}-wildcard-tls
  {{- end }}
  rules:
    # Wildcard rule: *.conformer.local -> registry-api
    # This catches all framework subdomains (cis, iso27001, soc2, etc.)
    - host: "*.{{ .Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "conformer.fullname" . }}-api
                port:
                  number: {{ .Values.registryApi.service.port }}
{{- end }}
