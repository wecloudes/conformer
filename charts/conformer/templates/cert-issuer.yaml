{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuer.name }}
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  {{- if eq (default "acme" .Values.certManager.issuer.type) "selfSigned" }}
  selfSigned: {}
  {{- else }}
  acme:
    server: {{ .Values.certManager.issuer.server }}
    email: {{ .Values.certManager.issuer.email }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuer.name }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.ingress.className }}
  {{- end }}
{{- end }}
