{{- if .Values.tekton.enabled }}
---
# PVC for Tekton pipeline workspace
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "conformer.fullname" . }}-tekton-workspace
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.tekton.workspace.storageClass }}
  storageClassName: {{ .Values.tekton.workspace.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.tekton.workspace.size }}
---
# ConfigMap containing the compliance patches (mounted into pipeline)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "conformer.fullname" . }}-patches
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
data:
  # Transformation units + framework manifests are loaded from transformations/
  # and frameworks/ at build time.
  # For production, consider using a PVC or Git clone instead.
  # This ConfigMap serves as a bootstrap / example.
  placeholder: "true"
---
# CronJob that triggers PipelineRuns on a schedule.
# Checks for new upstream module releases and creates PipelineRuns for each.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "conformer.fullname" . }}-release-checker
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.tekton.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "conformer.fullname" . }}-tekton-sa
          containers:
            - name: check-releases
              image: bitnami/kubectl:1.29
              command:
                - /bin/sh
                - -c
                - |
                  #!/bin/sh
                  set -euo pipefail

                  # List of modules to track
                  MODULES="s3-bucket vpc eks rds"
                  NAMESPACE="terraform-aws-modules"
                  PROVIDER="aws"
                  FRAMEWORKS="cis_v600,iso27001,soc2"

                  for MODULE in ${MODULES}; do
                    # Get latest release from GitHub API
                    LATEST=$(wget -qO- "https://api.github.com/repos/${NAMESPACE}/terraform-${PROVIDER}-${MODULE}/releases/latest" | \
                      grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/' || echo "")

                    if [ -z "${LATEST}" ]; then
                      echo "Could not determine latest version for ${MODULE}, skipping"
                      continue
                    fi

                    echo "Latest ${MODULE}: v${LATEST}"

                    # Check if this version already exists in MinIO
                    # (simplified: just create the PipelineRun, the upload task is idempotent)
                    cat <<EOF | kubectl apply -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    generateName: build-${MODULE}-${LATEST}-
                    namespace: {{ .Release.Namespace }}
                    labels:
                      conformer/module: "${MODULE}"
                      conformer/version: "${LATEST}"
                  spec:
                    pipelineRef:
                      name: {{ include "conformer.fullname" . }}-build-module
                    params:
                      - name: module-namespace
                        value: "${NAMESPACE}"
                      - name: module-name
                        value: "${MODULE}"
                      - name: module-provider
                        value: "${PROVIDER}"
                      - name: module-version
                        value: "${LATEST}"
                      - name: frameworks
                        value: "${FRAMEWORKS}"
                    workspaces:
                      - name: shared-workspace
                        volumeClaimTemplate:
                          spec:
                            accessModes:
                              - ReadWriteOnce
                            resources:
                              requests:
                                storage: {{ .Values.tekton.workspace.size }}
                      - name: patches-workspace
                        configMap:
                          name: {{ include "conformer.fullname" . }}-patches
                  EOF
                  done
---
# ServiceAccount for the CronJob to create PipelineRuns
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "conformer.fullname" . }}-tekton-sa
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "conformer.fullname" . }}-tekton-runner
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "conformer.fullname" . }}-tekton-runner
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "conformer.fullname" . }}-tekton-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "conformer.fullname" . }}-tekton-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
