{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: {{ include "conformer.fullname" . }}-patch-module
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  description: >
    Applies compliance patches to an upstream Terraform module using the DIY
    transformation playbook: sanitize (sed + gitleaks), block removal (awk),
    structural rewrite (mapotf + hcledit), advisory toggles, then fmt + zip.
  params:
    - name: framework
      type: string
      description: "Compliance framework storage path (e.g., cis_v600, iso27001)"
    - name: module-name
      type: string
      description: "Module name (e.g., s3-bucket)"
    - name: module-version
      type: string
      description: "Module version"
  workspaces:
    - name: source
      description: "Workspace with the fetched module"
    - name: patches
      description: "Workspace with compliance patch files"
  steps:
    # -------------------------------------------------------------------------
    # Layer 0 — copy upstream into the patched/ output dir
    # -------------------------------------------------------------------------
    - name: prepare
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        MODULE_DIR="$(workspaces.source.path)/module"
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        rm -rf "${OUTPUT_DIR}"
        cp -r "${MODULE_DIR}" "${OUTPUT_DIR}"
        echo "Prepared ${OUTPUT_DIR}"

    # -------------------------------------------------------------------------
    # Layer 1 — CONTENT SANITIZATION (slide 30: sed + hcledit + gitleaks)
    # Strip hardcoded account IDs and regions, fail on any leaked secret.
    # -------------------------------------------------------------------------
    - name: sanitize
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        cd "${OUTPUT_DIR}"

        echo "=== Sanitizing hardcoded identifiers ==="
        # 12-digit AWS account IDs -> data.aws_caller_identity reference
        find . -name '*.tf' -print0 | xargs -0 -r sed -i -E \
          's/[0-9]{12}/\$\{data.aws_caller_identity.current.account_id\}/g'
        # Hardcoded region literals in ARNs -> data.aws_region reference
        find . -name '*.tf' -print0 | xargs -0 -r sed -i -E \
          's/(arn:aws:[a-z0-9-]*:)(us|eu|ap|sa|ca|me|af)-[a-z]+-[0-9]/\1\$\{data.aws_region.current.name\}/g'

        echo "=== gitleaks secret scan ==="
        gitleaks detect --no-git --source . --redact --exit-code 1

    # -------------------------------------------------------------------------
    # Layer 2 — BLOCK REMOVAL (slide 28: awk brace-counter)
    # Strip any provisioner / local-exec blocks injected upstream.
    # -------------------------------------------------------------------------
    - name: strip-provisioners
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        cd "${OUTPUT_DIR}"

        echo "=== Removing provisioner blocks ==="
        for f in $(find . -name '*.tf'); do
          awk '
            /^[[:space:]]*provisioner / { s=1; d=0 }
            s { if (/{/) d++;
                if (/}/ && d>0) { d--; if (d==0) { s=0; next } }
                next }
            { print }
          ' "$f" > "$f.stripped" && mv "$f.stripped" "$f"
        done

    # -------------------------------------------------------------------------
    # Layer 3 — STRUCTURAL TRANSFORMS (slides 27/29: mapotf + hcledit)
    # Inject lifecycle protection, override insecure attributes, add checks.
    # -------------------------------------------------------------------------
    - name: transform
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        FRAMEWORK="$(params.framework)"
        MODULE="$(params.module-name)"
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        RULES_DIR="$(workspaces.patches.path)/${FRAMEWORK}/${MODULE}"

        cd "${OUTPUT_DIR}"

        if [ -f "${RULES_DIR}/rules.mptf.hcl" ]; then
          echo "=== mapotf: applying ${FRAMEWORK} structural rules ==="
          # mapotf transforms the .tf in the cwd; --mptf-dir holds the rules.
          # -r also descends into child modules. Backups (*.tf.mptfbackup) are
          # discarded since we zip a fresh tree.
          mapotf transform -r --mptf-dir "${RULES_DIR}"
          find . -name '*.tf.mptfbackup' -delete
        else
          echo "No mapotf rules at ${RULES_DIR}, skipping structural layer"
        fi

        # hcledit example (slide 27) — belt-and-suspenders prevent_destroy on the
        # primary bucket in case the module renames the mapotf-targeted block.
        if [ -f main.tf ] && command -v hcledit >/dev/null; then
          hcledit block list -f main.tf | grep -q '^resource.aws_s3_bucket.this$' && \
            hcledit attribute append 'resource.aws_s3_bucket.this.lifecycle.prevent_destroy' true \
              -f main.tf -u 2>/dev/null || true
        fi

    # -------------------------------------------------------------------------
    # Layer 4 — ADVISORY TOGGLES + METADATA (slide 29 layer 1: validation {})
    # Append the framework opt-out variables and a build marker.
    # -------------------------------------------------------------------------
    - name: append-toggles
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        FRAMEWORK="$(params.framework)"
        MODULE="$(params.module-name)"
        VERSION="$(params.module-version)"
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        PATCH_DIR="$(workspaces.patches.path)/${FRAMEWORK}/${MODULE}"

        if [ -f "${PATCH_DIR}/patch.hcl" ]; then
          echo "# === Compliance toggles: ${FRAMEWORK} ===" >> "${OUTPUT_DIR}/_compliance.tf"
          cat "${PATCH_DIR}/patch.hcl" >> "${OUTPUT_DIR}/_compliance.tf"
        fi

        cat >> "${OUTPUT_DIR}/_compliance.tf" <<EOF

        variable "compliance_framework" {
          type        = string
          default     = "${FRAMEWORK}"
          description = "Compliance framework applied to this module"

          validation {
            condition     = var.compliance_framework == "${FRAMEWORK}"
            error_message = "This module is patched for the ${FRAMEWORK} framework."
          }
        }
        EOF

    # -------------------------------------------------------------------------
    # Layer 5 — fmt + validate the patched tree
    # -------------------------------------------------------------------------
    - name: fmt-validate
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        cd "${OUTPUT_DIR}"
        terraform fmt -recursive .
        # init -backend=false so `validate` can run offline against providers
        terraform init -backend=false -input=false >/dev/null 2>&1 || true
        terraform validate || echo "WARN: validate failed (provider/var context may be incomplete)"
        echo "Patched module:"; ls -la

    # -------------------------------------------------------------------------
    # Layer 6 — zip for upload
    # -------------------------------------------------------------------------
    - name: zip
      image: {{ .Values.tekton.patchImage }}
      script: |
        #!/bin/bash
        set -euo pipefail
        OUTPUT_DIR="$(workspaces.source.path)/patched"
        ZIP_FILE="$(workspaces.source.path)/module.zip"
        cd "${OUTPUT_DIR}"
        zip -r "${ZIP_FILE}" . -x "*.git*" "*.terraform*" "*.tf.mptfbackup"
        echo "Created ${ZIP_FILE} ($(du -h "${ZIP_FILE}" | cut -f1))"
{{- end }}
