{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: {{ include "conformer.fullname" . }}-upload-minio
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  description: >
    Uploads the patched and zipped module to MinIO with the correct
    key structure for the registry API to serve.
  params:
    - name: module-namespace
      type: string
    - name: module-name
      type: string
    - name: module-provider
      type: string
    - name: module-version
      type: string
    - name: framework
      type: string
    - name: minio-endpoint
      type: string
      default: "{{ include "conformer.minioEndpoint" . }}"
    - name: minio-bucket
      type: string
      default: "modules"
  workspaces:
    - name: source
      description: "Workspace containing module.zip"
  steps:
    - name: upload
      image: minio/mc:RELEASE.2024-07-31T15-58-33Z
      env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "conformer.fullname" . }}-minio-creds
              key: root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "conformer.fullname" . }}-minio-creds
              key: root-password
      script: |
        #!/bin/sh
        set -euo pipefail

        NAMESPACE="$(params.module-namespace)"
        NAME="$(params.module-name)"
        PROVIDER="$(params.module-provider)"
        VERSION="$(params.module-version)"
        FRAMEWORK="$(params.framework)"
        ENDPOINT="$(params.minio-endpoint)"
        BUCKET="$(params.minio-bucket)"

        ZIP_FILE="$(workspaces.source.path)/module.zip"
        OBJECT_KEY="${NAMESPACE}/${NAME}/${PROVIDER}/${FRAMEWORK}/${VERSION}.zip"

        echo "Configuring MinIO client..."
        mc alias set registry "http://${ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

        # Ensure bucket exists
        mc mb --ignore-existing "registry/${BUCKET}"

        echo "Uploading ${ZIP_FILE} -> ${BUCKET}/${OBJECT_KEY}"
        mc cp "${ZIP_FILE}" "registry/${BUCKET}/${OBJECT_KEY}"

        echo "Upload complete. Verifying..."
        mc stat "registry/${BUCKET}/${OBJECT_KEY}"
{{- end }}
