{{- if .Values.tekton.enabled }}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: {{ include "conformer.fullname" . }}-fetch-upstream
  labels:
    {{- include "conformer.labels" . | nindent 4 }}
spec:
  description: >
    Fetches an upstream Terraform module from GitHub at a specific tag
    and writes it to the workspace for patching.
  params:
    - name: module-namespace
      type: string
      description: "GitHub org (e.g., terraform-aws-modules)"
    - name: module-name
      type: string
      description: "Module name (e.g., s3-bucket)"
    - name: module-provider
      type: string
      description: "Provider (e.g., aws)"
    - name: module-version
      type: string
      description: "Git tag / version (e.g., 5.11.0)"
  workspaces:
    - name: source
      description: "Workspace to write the fetched module"
  steps:
    - name: fetch
      image: alpine/git:2.43.0
      script: |
        #!/bin/sh
        set -euo pipefail

        NAMESPACE="$(params.module-namespace)"
        NAME="$(params.module-name)"
        PROVIDER="$(params.module-provider)"
        VERSION="$(params.module-version)"

        REPO_URL="https://github.com/${NAMESPACE}/terraform-${PROVIDER}-${NAME}.git"
        DEST="$(workspaces.source.path)/module"

        echo "Cloning ${REPO_URL} at tag v${VERSION}..."
        git clone --depth 1 --branch "v${VERSION}" "${REPO_URL}" "${DEST}" 2>/dev/null || \
          git clone --depth 1 --branch "${VERSION}" "${REPO_URL}" "${DEST}"

        # Remove .git directory to keep it clean
        rm -rf "${DEST}/.git"

        echo "Module fetched to ${DEST}"
        ls -la "${DEST}"
{{- end }}
