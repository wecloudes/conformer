apiVersion: v2
name: conformer
description: Open-source Terraform compliance module registry with framework-aware routing
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: keycloak
    version: "24.2.4"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: keycloak.enabled
  - name: minio
    version: "14.8.5"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled
