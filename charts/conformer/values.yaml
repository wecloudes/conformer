## Global settings
domain: conformer.local

## Registry API (custom Go service)
registryApi:
  image:
    repository: conformer-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  # On-demand patching: when enabled, a cache miss makes the API fetch the
  # module from upstreamRegistry and patch it for the requested framework,
  # instead of relying solely on pre-built (Tekton) artifacts. The API image
  # must be the toolkit-based one (registry-api/Dockerfile). Off by default on
  # K8s — prefer Tekton pre-builds; enable for a registry that serves any module.
  dynamicBuild:
    enabled: false
    upstreamRegistry: registry.terraform.io
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 8080

## TLS via cert-manager
certManager:
  enabled: true
  issuer:
    name: letsencrypt-prod
    email: admin@conformer.local
    server: https://acme-v02.api.letsencrypt.org/directory
    # For local dev, use self-signed:
    # type: selfSigned

## Ingress (nginx)
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

## Tekton pipelines (CRDs applied from templates/tekton/)
tekton:
  enabled: true
  schedule: "0 6 * * *"  # Daily 6am UTC check for upstream releases
  # Patch toolkit: opentofu + mapotf + graft + hcledit + jq + gitleaks + awk/sed.
  # Build from patches/Dockerfile.patch-toolkit and push to your registry.
  patchImage: conformer-patch-toolkit:latest
  workspace:
    storageClass: ""
    size: 5Gi

## Supported frameworks
frameworks:
  - name: cis
    storagePath: cis_v600
    free: true
  - name: iso27001
    storagePath: iso27001
    free: false
  - name: soc2
    storagePath: soc2
    free: false
  - name: hipaa
    storagePath: hipaa
    free: false
  - name: pci
    storagePath: pci_dss
    free: false
  - name: nist
    storagePath: nist_800_53
    free: false

# ---------------------------------------------------------------------------
# Official Bitnami Keycloak subchart overrides
# Full reference: https://github.com/bitnami/charts/tree/main/bitnami/keycloak
# ---------------------------------------------------------------------------
keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: "changeme-keycloak-admin"
  # Import our compliance realm on startup
  keycloakConfigCli:
    enabled: true
    configuration:
      compliance-realm.json: |
        {}
    # Actual realm JSON is in templates/keycloak-realm-configmap.yaml
    # and mounted via existingConfigmap
    existingConfigmap: compliance-keycloak-realm
  postgresql:
    enabled: true
    auth:
      postgresPassword: "changeme-pg-password"
      password: "changeme-keycloak-db"
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: auth.conformer.local
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ---------------------------------------------------------------------------
# Official Bitnami MinIO subchart overrides
# Full reference: https://github.com/bitnami/charts/tree/main/bitnami/minio
# ---------------------------------------------------------------------------
minio:
  enabled: true
  auth:
    rootUser: minio-admin
    rootPassword: "changeme-minio-secret"
  defaultBuckets: "modules"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  service:
    type: ClusterIP
  ingress:
    enabled: false  # MinIO API only accessed internally by registry-api
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
